#cloud-config
# Bootstrap a dedicated OCI Compute VM for the vm-lab stress target.
#
# One-shot install of the OCI Management Agent (so host metrics flow
# into Stack Monitoring) + stress-ng + the lab scripts cloned from the
# repo. The VM sits idle until an operator runs
# `apply-stress.sh KIND=cpu`.
#
# TENANCY PORTABILITY: this cloud-init template contains two regional
# placeholders that MUST be substituted via envsubst before upload to
# the VM (or via a Terraform `template_file` resource):
#
#   ${OCI_REGION}                       — e.g. us-ashburn-1 / eu-frankfurt-1
#   ${MGMT_AGENT_BUCKET_NAMESPACE}      — Object Storage namespace hosting
#                                         the Management Agent installer
#                                         for this tenancy
#
# Example render:
#   export OCI_REGION=eu-frankfurt-1
#   export MGMT_AGENT_BUCKET_NAMESPACE=<your-tenancy-ns>
#   envsubst < cloud-init.yaml > cloud-init.rendered.yaml

package_update: true
packages:
  - git
  - stress-ng

runcmd:
  # 1. Install OCI Management Agent — installer is region-pinned, and the
  #    bucket namespace differs per tenancy.
  - curl -fsSL "https://objectstorage.${OCI_REGION}.oraclecloud.com/n/${MGMT_AGENT_BUCKET_NAMESPACE}/b/management-agent-install/o/install.py" | sudo python3 - || true

  # 2. Clone octo-apm-demo to /opt/octo for the lab scripts
  - git clone --depth 1 https://github.com/adibirzu/octo-apm-demo.git /opt/octo
  - chmod +x /opt/octo/services/vm-lab/scripts/*.sh

  # 3. Tag the VM in ~/.octo/host.env so operators can confirm which
  #    profile applied last by reading one file.
  - mkdir -p /var/log/octo
  - echo "octo-vm-lab bootstrap complete $(date -u +%FT%TZ)" >> /var/log/octo/bootstrap.log

final_message: "octo-vm-lab ready after $UPTIME seconds. Apply stress with: sudo RUN_ID=\$(uuidgen) KIND=cpu /opt/octo/services/vm-lab/scripts/apply-stress.sh"

# octo-cache — Redis 7 StatefulSet for OKE.
#
# Single-replica, persisted (PVC) — appropriate for demo + workshop.
# A real production deploy would use Redis Sentinel or the Enterprise
# operator; the correlation contract does not require cluster mode.
#
# Apps connect via:  redis://cache.octo-cache.svc.cluster.local:6379

apiVersion: v1
kind: Namespace
metadata:
  name: octo-cache
  labels:
    app.kubernetes.io/part-of: octo-apm-demo

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cache
  namespace: octo-cache
  labels:
    app: cache
spec:
  serviceName: cache
  replicas: 1
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - "allkeys-lru"
            - --save
            - "60 1000"         # snapshot every 60s if >=1000 keys changed
          ports:
            - { name: redis, containerPort: 6379 }
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: octo-cache
spec:
  selector:
    app: cache
  ports:
    - { name: redis, port: 6379, targetPort: redis }
  clusterIP: None  # headless — required for StatefulSet DNS

apiVersion: v1
kind: Namespace
metadata:
  name: octo-object
  labels:
    app.kubernetes.io/part-of: octo-apm-demo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: object-pipeline
  namespace: octo-object
spec:
  replicas: 2
  selector:
    matchLabels:
      app: object-pipeline
  template:
    metadata:
      labels:
        app: object-pipeline
    spec:
      containers:
        - name: api
          image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-object-pipeline:${IMAGE_TAG:-latest}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OCI_OS_NAMESPACE
              value: "${OCIR_TENANCY}"
            - name: OCI_EVENTS_TOPIC_URL
              valueFrom:
                secretKeyRef:
                  name: octo-events
                  key: topic-url
                  optional: true
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: object-pipeline
  namespace: octo-object
spec:
  selector:
    app: object-pipeline
  ports:
    - name: http
      port: 8080
      targetPort: http

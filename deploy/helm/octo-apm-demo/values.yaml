# octo-apm-demo — default values.
#
# This chart assumes the target OKE cluster already exists. It will not
# provision ATP, APM, DNS zones, or OCIR repositories — those are the
# responsibility of deploy/bootstrap.sh or the operator's own pipeline.
#
# The chart exposes Shop, CRM, Java payment gateway, Workflow Gateway, plus a
# shared secret skeleton. By default it DOES NOT create secrets — it references existing
# secrets named `octo-atp`, `octo-auth`, `octo-apm`, `octo-logging`,
# `octo-oci-config`, `octo-sso`, `octo-atp-wallet` that bootstrap.sh seeds.
# Flip `secrets.create: true` to render them from values (use --set-file
# for the wallet zip). See README.md for the one-shot install flow.

global:
  # Public base domain for shop/crm FQDNs. Shop is served at
  # "<shop.subdomain>.<dnsDomain>" and CRM at "<crm.subdomain>.<dnsDomain>".
  dnsDomain: example.com
  ociRegion: eu-frankfurt-1
  serviceNamespace: octo
  stackName: octo-apm-demo
  monitoringNamespace: octo_apm_demo
  okeClusterName: octo-apm-demo-oke
  environment: production

  # OCIR image coordinates. Both components pull from the same registry
  # namespace — override per-component via shop.image.* / crm.image.* if
  # images live in different repos.
  image:
    region: eu-frankfurt-1
    tenancy: ""   # OCIR namespace (e.g. "frxxxxxx"). REQUIRED.
    tag: latest
    pullPolicy: IfNotPresent
    pullSecretName: ocir-pull-secret

  # OCI auth mode for the workloads. "instance_principal" requires that the
  # node pool's dynamic group has the necessary policies. Alternative:
  # "workload_identity" (OKE enhanced clusters only).
  ociAuthMode: instance_principal

  # Pod labels applied to every workload.
  commonLabels:
    app.kubernetes.io/part-of: octo-apm-demo

# ── Secrets policy ──────────────────────────────────────────────────────
# createSecrets=false (default) → this chart only references secrets.
# createSecrets=true            → chart renders them from `values.secretsData`
#                                  and --set-file input. Use sparingly and
#                                  NEVER check the filled values.yaml into
#                                  git.
secrets:
  create: false
  # Used only when secrets.create=true. Required runtime fields are validated
  # at render time so Helm fails before creating pods that cannot start.
  # Optional integration fields are skipped when empty so optional secretKeyRef
  # lookups stay truly optional.
  data:
    atp:
      dsn: ""
      username: ""
      password: ""
      walletPassword: ""
    auth:
      tokenSecret: ""
      internalServiceKey: ""
      appSecretKey: ""
      bootstrapAdminPassword: ""
    apm:
      endpoint: ""
      privateKey: ""
      publicKey: ""
      rumEndpoint: ""
      rumWebApplicationOcid: ""
    logging:
      logGroupId: ""
      logId: ""
      logChaosAuditId: ""
      logSecurityId: ""
    ociConfig:
      compartmentId: ""
      genaiEndpoint: ""
      genaiModelId: ""
      selectaiProfileName: ""
    llmetry:
      langfuseEnabled: ""
      langfuseHost: ""
      langfusePublicKey: ""
      langfuseSecretKey: ""
      langfuseOtelExportEnabled: ""
    sso:
      idcsDomainUrl: ""
      idcsClientId: ""
      idcsClientSecret: ""
  # Base64-encoded ATP wallet zip. Supply via --set-file like:
  #   --set-file secrets.atpWalletB64=./wallet.zip.b64
  # (Plain unencoded ZIP via --set-file secrets.atpWallet=./wallet.zip also
  # works — the template base64-encodes whichever is set.)
  atpWallet: ""
  atpWalletB64: ""

# ── Shop ────────────────────────────────────────────────────────────────
shop:
  enabled: true
  namespace: octo-drone-shop
  # Leaf subdomain; FQDN = "<subdomain>.<global.dnsDomain>".
  subdomain: shop
  replicas: 2
  image:
    repository: octo-drone-shop
    # Inherit region/tenancy/tag from global.image unless set here.
    region: ""
    tenancy: ""
    tag: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    cpuTargetUtilization: 60
    memoryTargetUtilization: 70
    # External RPS metric (D-02, D-03). Gated default-OFF per D-05:
    # `helm template` with the default values must produce no
    # `type: External` block, preserving bit-identical output for
    # existing consumers. Flip `enabled: true` after Plan 07-02 lands
    # prometheus-adapter so the External metric resolves.
    rps:
      enabled: false
      metricName: shop_request_rate
      targetPerPod: 30
    # Behavior block (Pitfall 1) — flap guard for the demo run.
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 2
            periodSeconds: 30
        selectPolicy: Max
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
        selectPolicy: Min
  pdb:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8080
  env:
    extra: {}

# ── Java payment gateway / app-server simulator ────────────────────────
javaGateway:
  enabled: true
  namespace: ""
  serviceName: octo-java-app-server-oke
  replicas: 2
  image:
    repository: octo-apm-java-demo
    region: ""
    tenancy: ""
    tag: ""
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      cpu: 500m
      memory: 768Mi
  # Java APM HPA (D-01) — own scaling profile, max 6 replicas (D-03).
  # RPS metric is gated default-off mirroring the shop block (D-05).
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    cpuTargetUtilization: 65
    memoryTargetUtilization: 75
    rps:
      enabled: false
      metricName: java_request_rate
      targetPerPod: 20
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 30
        policies:
          - type: Percent
            value: 100
            periodSeconds: 30
          - type: Pods
            value: 2
            periodSeconds: 30
        selectPolicy: Max
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 25
            periodSeconds: 60
        selectPolicy: Min
  pdb:
    enabled: true
    minAvailable: 1

# ── Workflow Gateway / Select AI proxy ────────────────────────────────
workflowGateway:
  enabled: true
  namespace: ""
  serviceName: octo-workflow-gateway-oke
  replicas: 1
  image:
    repository: octo-workflow-gateway
    region: ""
    tenancy: ""
    tag: ""
  pollSeconds: 90
  selectaiTimeoutSeconds: 30
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── CRM ─────────────────────────────────────────────────────────────────
crm:
  enabled: true
  namespace: enterprise-crm
  subdomain: crm
  replicas: 2
  image:
    repository: enterprise-crm-portal
    region: ""
    tenancy: ""
    tag: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    cpuTargetUtilization: 70
    memoryTargetUtilization: 75
  pdb:
    enabled: true
    minAvailable: 1
  service:
    type: ClusterIP
    port: 8080
  ordersSync:
    enabled: true
    intervalSeconds: 300
  env:
    extra: {}

# ── Ingress ─────────────────────────────────────────────────────────────
# Chart assumes an ingress controller already exists (nginx-ingress,
# oci-native-ingress-controller, etc). Set ingress.enabled=false if the
# cluster has none and you want to expose via LoadBalancer Services only.
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  tls:
    enabled: true
    # Chart does NOT create TLS secrets — reference a pre-created one, or
    # set tls.secretName to "" to disable TLS on the Ingress.
    secretName: octo-apm-demo-tls

# ── Namespaces ──────────────────────────────────────────────────────────
# Whether the chart creates the shop + crm namespaces. Set to false if the
# caller already manages namespaces out-of-band (bootstrap.sh, GitOps).
namespaces:
  create: true

# ── Tetragon (eBPF) ─────────────────────────────────────────────────────
# Deploys Cilium Tetragon as a privileged DaemonSet to emit eBPF kernel
# telemetry directly into /var/log/tetragon for the Oracle Cloud Agent to pick up.
tetragon:
  enabled: true

# ── Stress runner (Phase 7) ─────────────────────────────────────────────
# In-cluster k6 wrapper Deployment used by the /admin/stress-test page.
# Default OFF (D-05 spirit). Plan 07-03 ships templates that gate on
# `.Values.stressRunner.enabled` — Plan 07-01 (this file) is the SOLE
# writer of this block so 07-03 does not re-edit values.yaml.
stressRunner:
  enabled: false
  namespace: octo-stress
  image:
    repository: octo-stress-runner
    region: ""
    tenancy: ""
    tag: ""
  internalKeySecret: octo-stress-runner-key

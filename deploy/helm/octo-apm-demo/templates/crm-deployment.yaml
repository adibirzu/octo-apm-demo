{{- if .Values.crm.enabled }}
{{- $crm := .Values.crm }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-crm-portal
  namespace: {{ $crm.namespace }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    {{- include "octo.crm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: crm
spec:
  replicas: {{ $crm.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "octo.crm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "octo.labels" . | nindent 8 }}
        {{- include "octo.crm.selectorLabels" . | nindent 8 }}
      annotations:
        octo.oracle.com/restartedAt: {{ printf "%s-r%d" (toString (default .Values.global.image.tag $crm.image.tag)) (int .Release.Revision) | quote }}
    spec:
      {{- if .Values.global.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.image.pullSecretName }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "octo.image" (list . $crm) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_NAME
              value: enterprise-crm-portal
            - name: OTEL_SERVICE_NAME
              value: enterprise-crm-portal
            - name: APP_RUNTIME
              value: oke
            - name: APP_ENV
              value: production
            - name: DNS_DOMAIN
              value: {{ .Values.global.dnsDomain | quote }}
            - name: CRM_BASE_URL
              value: {{ printf "https://%s" (include "octo.fqdn" (list . $crm)) | quote }}
            - name: SERVICE_SHOP_URL
              value: {{ printf "http://octo-drone-shop.%s.svc.cluster.local:8080" .Values.shop.namespace | quote }}
            - name: OCI_AUTH_MODE
              value: {{ .Values.global.ociAuthMode | quote }}
            - name: APP_SECRET_KEY
              valueFrom: {secretKeyRef: {name: octo-auth, key: app-secret-key}}
            - name: INTERNAL_SERVICE_KEY
              valueFrom: {secretKeyRef: {name: octo-auth, key: internal-service-key}}
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: octo-auth, key: bootstrap-admin-password}}
            - name: ORACLE_DSN
              valueFrom: {secretKeyRef: {name: octo-atp, key: dsn}}
            - name: ORACLE_USER
              valueFrom: {secretKeyRef: {name: octo-atp, key: username}}
            - name: ORACLE_PASSWORD
              valueFrom: {secretKeyRef: {name: octo-atp, key: password}}
            - name: ORACLE_WALLET_DIR
              value: /opt/oracle/wallet
            - name: ORACLE_WALLET_PASSWORD
              valueFrom: {secretKeyRef: {name: octo-atp, key: wallet-password}}
            - name: OCI_APM_ENDPOINT
              valueFrom: {secretKeyRef: {name: octo-apm, key: endpoint, optional: true}}
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom: {secretKeyRef: {name: octo-apm, key: private-key, optional: true}}
            - name: OCI_APM_RUM_ENDPOINT
              valueFrom: {secretKeyRef: {name: octo-apm, key: rum-endpoint, optional: true}}
            - name: OCI_APM_RUM_PUBLIC_DATAKEY
              valueFrom: {secretKeyRef: {name: octo-apm, key: public-key, optional: true}}
            - name: OCI_LOG_ID
              valueFrom: {secretKeyRef: {name: octo-logging, key: log-id, optional: true}}
            - name: OCI_LOG_GROUP_ID
              valueFrom: {secretKeyRef: {name: octo-logging, key: log-group-id, optional: true}}
            - name: IDCS_DOMAIN_URL
              valueFrom: {secretKeyRef: {name: octo-sso, key: idcs-domain-url, optional: true}}
            - name: IDCS_CLIENT_ID
              valueFrom: {secretKeyRef: {name: octo-sso, key: idcs-client-id, optional: true}}
            - name: IDCS_CLIENT_SECRET
              valueFrom: {secretKeyRef: {name: octo-sso, key: idcs-client-secret, optional: true}}
            - name: ORDERS_SYNC_ENABLED
              value: {{ $crm.ordersSync.enabled | quote }}
            - name: ORDERS_SYNC_INTERVAL_SECONDS
              value: {{ $crm.ordersSync.intervalSeconds | quote }}
            {{- range $k, $v := $crm.env.extra }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: wallet
              mountPath: /opt/oracle/wallet
              readOnly: true
          readinessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet: {path: /ready, port: http}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml $crm.resources | nindent 12 }}
      volumes:
        - name: wallet
          secret:
            secretName: octo-atp-wallet
      terminationGracePeriodSeconds: 45
{{- end }}

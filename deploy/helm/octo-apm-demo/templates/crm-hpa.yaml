{{- if and .Values.crm.enabled .Values.crm.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enterprise-crm-portal
  namespace: {{ .Values.crm.namespace }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enterprise-crm-portal
  minReplicas: {{ .Values.crm.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.crm.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.crm.autoscaling.cpuTargetUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.crm.autoscaling.memoryTargetUtilization }}
{{- end }}

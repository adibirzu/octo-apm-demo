{{- if .Values.javaGateway.enabled }}
{{- $java := .Values.javaGateway }}
{{- $javaNamespace := default .Values.shop.namespace $java.namespace }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-apm-java-demo
  namespace: {{ $javaNamespace }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    {{- include "octo.javaGateway.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: java-payment-gateway
    demo.role: app-server-populator
spec:
  replicas: {{ $java.replicas }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "octo.javaGateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "octo.labels" . | nindent 8 }}
        {{- include "octo.javaGateway.selectorLabels" . | nindent 8 }}
      annotations:
        octo.oracle.com/restartedAt: {{ printf "%s-r%d" (toString (default .Values.global.image.tag $java.image.tag)) (int .Release.Revision) | quote }}
        oracle.com/oci_la_log_source_name: "SOC Application Logs"
        oracle.com/oci_la_log_set: "octo-apm-demo"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.global.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.image.pullSecretName }}
      {{- end }}
      containers:
        - name: app
          image: {{ include "octo.image" (list . $java) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: OCI_APM_SERVICE_NAME
              value: {{ $java.serviceName | quote }}
            - name: APP_RUNTIME
              value: oke
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SERVICE_NAMESPACE
              value: {{ .Values.global.serviceNamespace | quote }}
            - name: SERVICE_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: DEMO_STACK_NAME
              value: {{ .Values.global.stackName | quote }}
            - name: OCI_AUTH_MODE
              value: {{ .Values.global.ociAuthMode | quote }}
            - name: OCI_REGION
              value: {{ .Values.global.ociRegion | quote }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace={{ .Values.global.serviceNamespace }},deployment.environment={{ .Values.global.environment }},cloud.provider=oci,oci.demo.stack={{ .Values.global.stackName }},k8s.cluster.name={{ .Values.global.okeClusterName }},k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME)"
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
                  optional: true
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
                  optional: true
            - name: PAYMENT_SIMULATION_MODE
              value: {{ default "approve" .Values.shop.env.paymentSimulationMode | quote }}
          resources:
            {{- toYaml $java.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: octo-apm-java-demo
  namespace: {{ $javaNamespace }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    {{- include "octo.javaGateway.selectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "octo.javaGateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- if $java.pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: octo-apm-java-demo
  namespace: {{ $javaNamespace }}
  labels:
    {{- include "octo.labels" . | nindent 4 }}
    {{- include "octo.javaGateway.selectorLabels" . | nindent 4 }}
spec:
  minAvailable: {{ $java.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "octo.javaGateway.selectorLabels" . | nindent 6 }}
{{- end }}
{{- end }}

{{- if .Values.secrets.create }}
{{- $d := .Values.secrets.data }}
{{- $ctxLabels := include "octo.labels" . | fromYaml }}
{{- $namespaces := list }}
{{- if .Values.shop.enabled }}{{ $namespaces = append $namespaces .Values.shop.namespace }}{{- end }}
{{- if .Values.crm.enabled }}{{ $namespaces = append $namespaces .Values.crm.namespace }}{{- end }}

{{- if $namespaces }}
{{- $_ := required "secrets.data.atp.dsn is required when secrets.create=true" $d.atp.dsn -}}
{{- $_ := required "secrets.data.atp.username is required when secrets.create=true" $d.atp.username -}}
{{- $_ := required "secrets.data.atp.password is required when secrets.create=true" $d.atp.password -}}
{{- $_ := required "secrets.data.atp.walletPassword is required when secrets.create=true" $d.atp.walletPassword -}}
{{- $_ := required "secrets.data.auth.internalServiceKey is required when secrets.create=true" $d.auth.internalServiceKey -}}
{{- if not (or .Values.secrets.atpWallet .Values.secrets.atpWalletB64) -}}
{{- fail "secrets.atpWallet or secrets.atpWalletB64 is required when secrets.create=true" -}}
{{- end -}}
{{- if .Values.shop.enabled -}}
{{- $_ := required "secrets.data.auth.tokenSecret is required when shop.enabled=true and secrets.create=true" $d.auth.tokenSecret -}}
{{- $_ := required "secrets.data.ociConfig.compartmentId is required when shop.enabled=true and secrets.create=true" $d.ociConfig.compartmentId -}}
{{- end -}}
{{- if .Values.crm.enabled -}}
{{- $_ := required "secrets.data.auth.appSecretKey is required when crm.enabled=true and secrets.create=true" $d.auth.appSecretKey -}}
{{- $_ := required "secrets.data.auth.bootstrapAdminPassword is required when crm.enabled=true and secrets.create=true" $d.auth.bootstrapAdminPassword -}}
{{- end -}}
{{- end }}

{{- range $ns := $namespaces }}
{{ include "octo.secret" (list "octo-atp" $ns $ctxLabels (dict
  "dsn" $d.atp.dsn
  "username" $d.atp.username
  "password" $d.atp.password
  "wallet-password" $d.atp.walletPassword)) }}
{{ include "octo.secret" (list "octo-auth" $ns $ctxLabels (dict
  "token-secret" $d.auth.tokenSecret
  "internal-service-key" $d.auth.internalServiceKey
  "app-secret-key" $d.auth.appSecretKey
  "bootstrap-admin-password" $d.auth.bootstrapAdminPassword)) }}
{{ include "octo.secret" (list "octo-apm" $ns $ctxLabels (dict
  "endpoint" $d.apm.endpoint
  "private-key" $d.apm.privateKey
  "public-key" $d.apm.publicKey
  "rum-endpoint" $d.apm.rumEndpoint
  "rum-web-application-ocid" $d.apm.rumWebApplicationOcid)) }}
{{ include "octo.secret" (list "octo-logging" $ns $ctxLabels (dict
  "log-group-id" $d.logging.logGroupId
  "log-id" $d.logging.logId
  "log-chaos-audit-id" $d.logging.logChaosAuditId
  "log-security-id" $d.logging.logSecurityId)) }}
{{ include "octo.secret" (list "octo-oci-config" $ns $ctxLabels (dict
  "compartment-id" $d.ociConfig.compartmentId
  "genai-endpoint" $d.ociConfig.genaiEndpoint
  "genai-model-id" $d.ociConfig.genaiModelId)) }}
{{ include "octo.secret" (list "octo-sso" $ns $ctxLabels (dict
  "idcs-domain-url" $d.sso.idcsDomainUrl
  "idcs-client-id" $d.sso.idcsClientId
  "idcs-client-secret" $d.sso.idcsClientSecret)) }}
{{- end }}

{{- /* ATP wallet: binary. If atpWallet is a raw zip, base64-encode. If
       atpWalletB64 is already base64, use it as-is. */ -}}
{{- $walletB64 := "" -}}
{{- if .Values.secrets.atpWalletB64 -}}
{{- $walletB64 = .Values.secrets.atpWalletB64 -}}
{{- else if .Values.secrets.atpWallet -}}
{{- $walletB64 = .Values.secrets.atpWallet | b64enc -}}
{{- end -}}
{{- if $walletB64 -}}
{{- range $ns := $namespaces }}
apiVersion: v1
kind: Secret
metadata:
  name: octo-atp-wallet
  namespace: {{ $ns }}
  labels:
    {{- toYaml $ctxLabels | nindent 4 }}
type: Opaque
data:
  wallet.zip: {{ $walletB64 | quote }}
---
{{- end }}
{{- end }}
{{- end }}

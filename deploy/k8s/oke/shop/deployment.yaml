# Drone Shop — production Deployment on OKE.
#
# Namespace:        octo-drone-shop
# Public hostname:  drones.${DNS_DOMAIN}
# Image:            ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-drone-shop:${IMAGE_TAG}
#
# Rendered via envsubst before apply:
#   envsubst < deploy/k8s/oke/shop/deployment.yaml | kubectl apply -f -

apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-drone-shop
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-drone-shop
    app.kubernetes.io/part-of: octo-apm-demo
    app.kubernetes.io/component: shop
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: octo-drone-shop
  template:
    metadata:
      labels:
        app: octo-drone-shop
        app.kubernetes.io/part-of: octo-apm-demo
      annotations:
        # Force rollout when data key secret rotates
        octo.oracle.com/restartedAt: "${IMAGE_TAG}"
        oracle.com/oci_la_log_source_name: "SOC Application Logs"
        oracle.com/oci_la_log_set: "octo-apm-demo"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: app
          image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-drone-shop:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: APP_NAME
              value: "octo-drone-shop"
            - name: OTEL_SERVICE_NAME
              value: "octo-drone-shop-oke"
            - name: APP_RUNTIME
              value: "oke"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SERVICE_NAMESPACE
              value: "octo"
            - name: SERVICE_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: DEMO_STACK_NAME
              value: "octo-apm-demo"
            - name: OCI_MONITORING_NAMESPACE
              value: "octo_apm_demo"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=octo,deployment.environment=production,cloud.provider=oci,oci.demo.stack=octo-apm-demo,k8s.cluster.name=${OKE_CLUSTER_NAME},k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME)"
            - name: OTEL_TRACES_SAMPLER
              value: "always_on"
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            - name: OTLP_LOG_EXPORT_ENABLED
              value: "false"
            - name: ENVIRONMENT
              value: "production"
            - name: DNS_DOMAIN
              value: "${DNS_DOMAIN}"
            - name: SERVICE_CRM_URL
              value: "http://enterprise-crm-portal.${K8S_NAMESPACE_CRM}.svc.cluster.local:8080"
            - name: CRM_PUBLIC_URL
              value: "https://admin.${DNS_DOMAIN}"
            - name: JAVA_APM_ENABLED
              value: "true"
            - name: JAVA_APM_SERVICE_URL
              value: "http://octo-apm-java-demo.${K8S_NAMESPACE_SHOP}.svc.cluster.local"
            - name: JAVA_APM_SERVICE_NAME
              value: "octo-java-app-server-oke"
            - name: PAYMENT_PROVIDER
              value: "simulated"
            - name: PAYMENT_GATEWAY_SIMULATION_ENABLED
              value: "true"
            - name: PAYMENT_SIMULATION_MODE
              value: "approve"
            - name: PAYMENT_SIMULATION_CURRENCY
              value: "usd"
            - name: WORKFLOW_API_BASE_URL
              value: "http://octo-workflow-gateway.${K8S_NAMESPACE_SHOP}.svc.cluster.local:8090"
            - name: WORKFLOW_PUBLIC_API_BASE_URL
              value: "/api/workflow-gateway"
            - name: WORKFLOW_SERVICE_NAME
              value: "octo-workflow-gateway-oke"
            - name: WORKFLOW_POLL_SECONDS
              value: "90"
            - name: WORKFLOW_FAULTY_QUERY_ENABLED
              value: "false"
            - name: SELECTAI_TIMEOUT_SECONDS
              value: "30"
            - name: OCI_AUTH_MODE
              value: "instance_principal"
            - name: OCI_REGION
              value: "${OCI_REGION}"
            # ── Cross-service shared secret
            - name: AUTH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: token-secret
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: internal-service-key
            # ── Autonomous DB
            - name: ORACLE_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: dsn
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: username
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: password
            - name: ORACLE_WALLET_DIR
              value: "/opt/oracle/wallet"
            - name: ORACLE_WALLET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: wallet-password
            # ── OCI APM (traces)
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
                  optional: true
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
                  optional: true
            # ── OCI APM RUM (browser)
            - name: OCI_APM_PUBLIC_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: public-key
                  optional: true
            - name: OCI_APM_RUM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: rum-endpoint
                  optional: true
            - name: OCI_APM_WEB_APPLICATION
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: rum-web-application-ocid
                  optional: true
            # ── OCI Logging (SDK ingestion) → Log Analytics
            - name: OCI_LOG_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-id
                  optional: true
            - name: OCI_LOG_GROUP_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-group-id
                  optional: true
            # ── Compartment + GenAI (for AI assistant)
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: compartment-id
            - name: OCI_GENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: genai-endpoint
                  optional: true
            - name: OCI_GENAI_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: genai-model-id
                  optional: true
            - name: SELECTAI_PROFILE_NAME
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: selectai-profile-name
                  optional: true
            - name: LLMETRY_ENABLED
              value: "true"
            - name: LLMETRY_STORE_ENABLED
              value: "true"
            - name: LLMETRY_CAPTURE_CONTENT
              value: "false"
            - name: LANGFUSE_ENABLED
              valueFrom:
                secretKeyRef:
                  name: octo-llmetry
                  key: langfuse-enabled
                  optional: true
            - name: LANGFUSE_HOST
              valueFrom:
                secretKeyRef:
                  name: octo-llmetry
                  key: langfuse-host
                  optional: true
            - name: LANGFUSE_PROJECT_NAME
              valueFrom:
                secretKeyRef:
                  name: octo-llmetry
                  key: langfuse-project-name
                  optional: true
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-llmetry
                  key: langfuse-public-key
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-llmetry
                  key: langfuse-secret-key
                  optional: true
            - name: LANGFUSE_OTEL_EXPORT_ENABLED
              valueFrom:
                secretKeyRef:
                  name: octo-llmetry
                  key: langfuse-otel-export-enabled
                  optional: true
            # ── IDCS SSO
            - name: IDCS_DOMAIN_URL
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-domain-url
                  optional: true
            - name: IDCS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-client-id
                  optional: true
            - name: IDCS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-client-secret
                  optional: true
          volumeMounts:
            - name: wallet
              mountPath: /opt/oracle/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
      volumes:
        - name: wallet
          secret:
            secretName: octo-atp-wallet
      terminationGracePeriodSeconds: 45

---
apiVersion: v1
kind: Service
metadata:
  name: octo-drone-shop
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-drone-shop
spec:
  type: ClusterIP
  selector:
    app: octo-drone-shop
  ports:
    - name: http
      port: 8080
      targetPort: http

---
# Edge-facing NodePort Service. The public OCI Load Balancer is managed
# outside Kubernetes and can target this service during a controlled cutover.
apiVersion: v1
kind: Service
metadata:
  name: octo-drone-shop-lb
  namespace: ${K8S_NAMESPACE_SHOP}
spec:
  type: NodePort
  selector:
    app: octo-drone-shop
  ports:
    - name: edge-http
      port: 80
      targetPort: http
      nodePort: 30080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: octo-drone-shop
  namespace: ${K8S_NAMESPACE_SHOP}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: octo-drone-shop
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    # External RPS metric (D-02, D-03). Published to the
    # `octo_apm_demo` OCI Monitoring namespace and exposed to HPA via the
    # prometheus-adapter / kube-metrics-adapter that lands in Plan 07-02.
    # Until the adapter is deployed the controller will skip this metric
    # silently — keeps the manifest valid offline (D-05 backward compat).
    - type: External
      external:
        metric:
          name: shop_request_rate
          selector:
            matchLabels:
              service: octo-drone-shop
        target:
          type: AverageValue
          averageValue: "30"
  # Behavior block: bound flap during demo runs (Pitfall 1 from
  # RESEARCH §Pattern 1). Aggressive scale-up (visible in 30s windows),
  # conservative scale-down (5-min stabilization) so attendees see the
  # downscale happen at a humane pace.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
      selectPolicy: Min

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: octo-drone-shop
  namespace: ${K8S_NAMESPACE_SHOP}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: octo-drone-shop

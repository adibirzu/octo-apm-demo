# Drone Shop — production Deployment on OKE.
#
# Namespace:        octo-shop-prod
# Public hostname:  drone.${DNS_DOMAIN}  (default: drone.octodemo.cloud)
# Image:            ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-drone-shop:${IMAGE_TAG:-latest}
#
# Rendered via envsubst before apply:
#   envsubst < deploy/k8s/oke/shop/deployment.yaml | kubectl apply -f -

apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-drone-shop
  namespace: octo-shop-prod
  labels:
    app: octo-drone-shop
    app.kubernetes.io/part-of: octo-apm-demo
    app.kubernetes.io/component: shop
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: octo-drone-shop
  template:
    metadata:
      labels:
        app: octo-drone-shop
        app.kubernetes.io/part-of: octo-apm-demo
      annotations:
        # Force rollout when data key secret rotates
        octo.oracle.com/restartedAt: "${IMAGE_TAG:-latest}"
    spec:
      containers:
        - name: app
          image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-drone-shop:${IMAGE_TAG:-latest}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_NAME
              value: "octo-drone-shop"
            - name: OTEL_SERVICE_NAME
              value: "octo-drone-shop"
            - name: APP_RUNTIME
              value: "oke"
            - name: ENVIRONMENT
              value: "production"
            - name: DNS_DOMAIN
              value: "${DNS_DOMAIN}"
            - name: SERVICE_CRM_URL
              value: "http://enterprise-crm-portal.octo-backend-prod.svc.cluster.local:8080"
            - name: CRM_PUBLIC_URL
              value: "https://backend.${DNS_DOMAIN}"
            - name: OCI_AUTH_MODE
              value: "instance_principal"
            # ── Cross-service shared secret
            - name: AUTH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: token-secret
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: internal-service-key
            # ── Autonomous DB
            - name: ORACLE_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: dsn
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: username
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: password
            - name: ORACLE_WALLET_DIR
              value: "/opt/oracle/wallet"
            - name: ORACLE_WALLET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: wallet-password
            # ── OCI APM (traces)
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
                  optional: true
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
                  optional: true
            # ── OCI APM RUM (browser)
            - name: OCI_APM_PUBLIC_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: public-key
                  optional: true
            - name: OCI_APM_RUM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: rum-endpoint
                  optional: true
            - name: OCI_APM_WEB_APPLICATION
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: web-application
                  optional: true
            # ── OCI Logging (SDK ingestion) → Log Analytics
            - name: OCI_LOG_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-id
                  optional: true
            - name: OCI_LOG_GROUP_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-group-id
                  optional: true
            # ── Compartment + GenAI (for AI assistant)
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: compartment-id
            - name: OCI_GENAI_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: genai-endpoint
                  optional: true
            - name: OCI_GENAI_MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: genai-model-id
                  optional: true
            # ── IDCS SSO
            - name: IDCS_DOMAIN_URL
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-domain-url
                  optional: true
            - name: IDCS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-client-id
                  optional: true
            - name: IDCS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-client-secret
                  optional: true
            - name: IDCS_REDIRECT_URI
              value: "https://drone.${DNS_DOMAIN}/api/auth/sso/callback"
            - name: IDCS_POST_LOGOUT_REDIRECT
              value: "https://drone.${DNS_DOMAIN}/login"
          volumeMounts:
            - name: wallet
              mountPath: /opt/oracle/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: wallet
          secret:
            secretName: octo-atp-wallet
      terminationGracePeriodSeconds: 45

---
apiVersion: v1
kind: Service
metadata:
  name: octo-drone-shop
  namespace: octo-shop-prod
  labels:
    app: octo-drone-shop
spec:
  type: ClusterIP
  selector:
    app: octo-drone-shop
  ports:
    - name: http
      port: 8080
      targetPort: http

---
# Public-facing LoadBalancer Service with OCI WAF attach annotation.
apiVersion: v1
kind: Service
metadata:
  name: octo-drone-shop-lb
  namespace: octo-shop-prod
  annotations:
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "100"
    service.beta.kubernetes.io/oci-load-balancer-subnet1: "${OCI_LB_SUBNET_OCID}"
    service.beta.kubernetes.io/oci-load-balancer-security-list-management-mode: "None"
    # Attach the WAF policy created by deploy/terraform/modules/waf/
    oci.oraclecloud.com/waf-policy-ocid: "${WAF_POLICY_SHOP_OCID}"
spec:
  type: LoadBalancer
  selector:
    app: octo-drone-shop
  ports:
    - name: https
      port: 443
      targetPort: http
    - name: http
      port: 80
      targetPort: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: octo-drone-shop
  namespace: octo-shop-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: octo-drone-shop
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: octo-drone-shop
  namespace: octo-shop-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: octo-drone-shop

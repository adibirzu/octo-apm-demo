# Enterprise CRM Portal — production Deployment on OKE.
#
# Namespace:        enterprise-crm
# Public hostname:  admin.${DNS_DOMAIN}
# Image:            ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/enterprise-crm-portal:${IMAGE_TAG}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-crm-portal
  namespace: ${K8S_NAMESPACE_CRM}
  labels:
    app: enterprise-crm-portal
    app.kubernetes.io/part-of: octo-apm-demo
    app.kubernetes.io/component: crm
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: enterprise-crm-portal
  template:
    metadata:
      labels:
        app: enterprise-crm-portal
        app.kubernetes.io/part-of: octo-apm-demo
      annotations:
        octo.oracle.com/restartedAt: "${IMAGE_TAG}"
        oracle.com/oci_la_log_source_name: "SOC Application Logs"
        oracle.com/oci_la_log_set: "octo-apm-demo"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: app
          image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/enterprise-crm-portal:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: APP_NAME
              value: "enterprise-crm-portal"
            - name: OTEL_SERVICE_NAME
              value: "enterprise-crm-portal-oke"
            - name: APP_RUNTIME
              value: "oke"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SERVICE_NAMESPACE
              value: "octo"
            - name: SERVICE_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: DEMO_STACK_NAME
              value: "octo-apm-demo"
            - name: OCI_MONITORING_NAMESPACE
              value: "octo_apm_demo"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=octo,deployment.environment=production,cloud.provider=oci,oci.demo.stack=octo-apm-demo,k8s.cluster.name=${OKE_CLUSTER_NAME},k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME)"
            - name: OTEL_TRACES_SAMPLER
              value: "always_on"
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            - name: OTLP_LOG_EXPORT_ENABLED
              value: "false"
            - name: APP_ENV
              value: "production"
            - name: DNS_DOMAIN
              value: "${DNS_DOMAIN}"
            - name: CRM_BASE_URL
              value: "https://admin.${DNS_DOMAIN}"
            - name: SERVICE_SHOP_URL
              value: "http://octo-drone-shop.${K8S_NAMESPACE_SHOP}.svc.cluster.local:8080"
            - name: OCI_AUTH_MODE
              value: "instance_principal"
            - name: OCI_REGION
              value: "${OCI_REGION}"
            # ── Cross-service
            - name: APP_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: app-secret-key
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: internal-service-key
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-auth
                  key: bootstrap-admin-password
            # ── Autonomous DB (shared)
            - name: ORACLE_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: dsn
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: username
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: password
            - name: ORACLE_WALLET_DIR
              value: "/opt/oracle/wallet"
            - name: ORACLE_WALLET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: wallet-password
            # ── OCI APM (traces)
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
                  optional: true
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
                  optional: true
            # ── OCI APM RUM (browser)
            - name: OCI_APM_RUM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: rum-endpoint
                  optional: true
            - name: OCI_APM_RUM_PUBLIC_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: public-key
                  optional: true
            # ── OCI Logging (SDK ingestion) → Log Analytics
            - name: OCI_LOG_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-id
                  optional: true
            - name: OCI_LOG_GROUP_ID
              valueFrom:
                secretKeyRef:
                  name: octo-logging
                  key: log-group-id
                  optional: true
            # ── Compartment for OCI Monitoring custom MELTS metrics
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: compartment-id
            # ── IDCS SSO
            - name: IDCS_DOMAIN_URL
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-domain-url
                  optional: true
            - name: IDCS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-client-id
                  optional: true
            - name: IDCS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: octo-sso
                  key: idcs-client-secret
                  optional: true
            # ── Orders sync toggle
            - name: ORDERS_SYNC_ENABLED
              value: "true"
            - name: ORDERS_SYNC_INTERVAL_SECONDS
              value: "300"
          volumeMounts:
            - name: wallet
              mountPath: /opt/oracle/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1536Mi"
      volumes:
        - name: wallet
          secret:
            secretName: octo-atp-wallet
      terminationGracePeriodSeconds: 45

---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-crm-portal
  namespace: ${K8S_NAMESPACE_CRM}
  labels:
    app: enterprise-crm-portal
spec:
  type: ClusterIP
  selector:
    app: enterprise-crm-portal
  ports:
    - name: http
      port: 8080
      targetPort: http

---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-crm-portal-lb
  namespace: ${K8S_NAMESPACE_CRM}
spec:
  type: NodePort
  selector:
    app: enterprise-crm-portal
  ports:
    - name: edge-http
      port: 80
      targetPort: http
      nodePort: 30081

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enterprise-crm-portal
  namespace: ${K8S_NAMESPACE_CRM}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enterprise-crm-portal
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enterprise-crm-portal
  namespace: ${K8S_NAMESPACE_CRM}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: enterprise-crm-portal

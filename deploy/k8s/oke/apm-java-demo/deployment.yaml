apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-apm-java-demo
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-apm-java-demo
    demo.role: app-server-populator
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  replicas: 2
  strategy:
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app: octo-apm-java-demo
  template:
    metadata:
      labels:
        app: octo-apm-java-demo
      annotations:
        octo.oracle.com/restartedAt: "${IMAGE_TAG}"
        oracle.com/oci_la_log_source_name: "SOC Application Logs"
        oracle.com/oci_la_log_set: "octo-apm-demo"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: app
          image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-apm-java-demo:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: OCI_APM_SERVICE_NAME
              value: octo-java-app-server-oke
            - name: APP_RUNTIME
              value: oke
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SERVICE_NAMESPACE
              value: octo
            - name: SERVICE_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: DEMO_STACK_NAME
              value: octo-apm-demo
            - name: OCI_AUTH_MODE
              value: instance_principal
            - name: OCI_REGION
              value: "${OCI_REGION}"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=octo,deployment.environment=production,cloud.provider=oci,oci.demo.stack=octo-apm-demo,k8s.cluster.name=${OKE_CLUSTER_NAME},k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME)"
            # The live crm-secrets / octo-apm convention uses short keys
            # (`endpoint`, `private-key`). init-tenancy.sh documents
            # `apm-endpoint` / `apm-private-datakey` for fresh tenancies;
            # we include both as fallbacks via `optional: true` so the pod
            # boots against either naming.
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: octo-apm-java-demo
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-apm-java-demo
spec:
  type: ClusterIP
  selector:
    app: octo-apm-java-demo
  ports:
    - name: http
      port: 80
      targetPort: 8080

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: octo-apm-java-demo
  namespace: ${K8S_NAMESPACE_SHOP}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: octo-apm-java-demo
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: octo-apm-java-demo-traffic
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-apm-java-demo
    demo.role: traffic-generator
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      template:
        spec:
          automountServiceAccountToken: false
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: Never
          containers:
            - name: curl
              image: docker.io/curlimages/curl:8.10.1
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command:
                - sh
                - -c
                - |
                  set -e
                  for i in $(seq 1 30); do
                      curl -sS -o /dev/null "http://octo-apm-java-demo.${K8S_NAMESPACE_SHOP}.svc.cluster.local/"
                      curl -sS -o /dev/null "http://octo-apm-java-demo.${K8S_NAMESPACE_SHOP}.svc.cluster.local/slow"
                      curl -sS -o /dev/null "http://octo-apm-java-demo.${K8S_NAMESPACE_SHOP}.svc.cluster.local/allocate"
                      curl -sS -o /dev/null -w "%{http_code}\n" "http://octo-apm-java-demo.${K8S_NAMESPACE_SHOP}.svc.cluster.local/error" || true
                      sleep 1
                  done
---
# Java APM gateway HPA — D-01 (HPA expanded for shop + java only) +
# D-03 (java max 6 replicas). Same External RPS metric shape as the
# shop HPA; the metric resolves to a no-op until prometheus-adapter
# lands in Plan 07-02 (D-05 backward compat).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: octo-apm-java-demo
  namespace: ${K8S_NAMESPACE_SHOP}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: octo-apm-java-demo
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
    - type: External
      external:
        metric:
          name: java_request_rate
          selector:
            matchLabels:
              service: octo-apm-java-demo
        target:
          type: AverageValue
          averageValue: "20"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
      selectPolicy: Min

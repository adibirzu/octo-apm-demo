apiVersion: apps/v1
kind: Deployment
metadata:
  name: octo-workflow-gateway
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-workflow-gateway
    app.kubernetes.io/part-of: octo-apm-demo
    app.kubernetes.io/component: workflow-gateway
spec:
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: octo-workflow-gateway
  template:
    metadata:
      labels:
        app: octo-workflow-gateway
        app.kubernetes.io/part-of: octo-apm-demo
      annotations:
        octo.oracle.com/restartedAt: "${IMAGE_TAG}"
        oracle.com/oci_la_log_source_name: "SOC Application Logs"
        oracle.com/oci_la_log_set: "octo-apm-demo"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ocir-pull-secret
      containers:
        - name: app
          image: ${OCIR_REGION}.ocir.io/${OCIR_TENANCY}/octo-workflow-gateway:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: WORKFLOW_APP_NAME
              value: "octo-workflow-gateway"
            - name: WORKFLOW_SERVICE_NAME
              value: "octo-workflow-gateway-oke"
            - name: APP_RUNTIME
              value: "oke"
            - name: ENVIRONMENT
              value: "production"
            - name: WORKFLOW_PORT
              value: "8090"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SERVICE_NAMESPACE
              value: "octo"
            - name: SERVICE_INSTANCE_ID
              value: "$(POD_NAME)"
            - name: DEMO_STACK_NAME
              value: "octo-apm-demo"
            - name: OCI_MONITORING_NAMESPACE
              value: "octo_apm_demo"
            - name: OCI_AUTH_MODE
              value: "instance_principal"
            - name: OCI_REGION
              value: "${OCI_REGION}"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=octo,deployment.environment=production,cloud.provider=oci,oci.demo.stack=octo-apm-demo,k8s.cluster.name=${OKE_CLUSTER_NAME},k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.node.name=$(NODE_NAME)"
            - name: OTEL_TRACES_SAMPLER
              value: "always_on"
            - name: OTLP_LOG_EXPORT_ENABLED
              value: "false"
            - name: ORACLE_DSN
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: dsn
            - name: ORACLE_USER
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: username
            - name: ORACLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: password
            - name: ORACLE_WALLET_DIR
              value: "/opt/oracle/wallet"
            - name: ORACLE_WALLET_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: octo-atp
                  key: wallet-password
            - name: ENTERPRISE_CRM_URL
              value: "http://enterprise-crm-portal.${K8S_NAMESPACE_CRM}.svc.cluster.local:8080"
            - name: OCI_APM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: endpoint
                  optional: true
            - name: OCI_APM_PRIVATE_DATAKEY
              valueFrom:
                secretKeyRef:
                  name: octo-apm
                  key: private-key
                  optional: true
            - name: OCI_COMPARTMENT_ID
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: compartment-id
            - name: WORKFLOW_LOG_LEVEL
              value: "info"
            - name: WORKFLOW_POLL_SECONDS
              value: "90"
            - name: WORKFLOW_ALLOWED_ORIGINS
              value: "https://drones.${DNS_DOMAIN},https://admin.${DNS_DOMAIN}"
            - name: WORKFLOW_FAULTY_QUERY_ENABLED
              value: "false"
            - name: SELECTAI_PROFILE_NAME
              valueFrom:
                secretKeyRef:
                  name: octo-oci-config
                  key: selectai-profile-name
                  optional: true
            - name: SELECTAI_TIMEOUT_SECONDS
              value: "30"
          volumeMounts:
            - name: wallet
              mountPath: /opt/oracle/wallet
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: wallet
          secret:
            secretName: octo-atp-wallet
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: octo-workflow-gateway
  namespace: ${K8S_NAMESPACE_SHOP}
  labels:
    app: octo-workflow-gateway
spec:
  type: ClusterIP
  selector:
    app: octo-workflow-gateway
  ports:
    - name: http
      port: 8090
      targetPort: http

# OCI Vault → Pod secrets via the Secrets Store CSI driver.
#
# One SecretProviderClass per namespace — ${NAMESPACE} is swapped via
# envsubst before kubectl apply:
#   for ns in octo-drone-shop enterprise-crm; do
#     NAMESPACE=$ns envsubst < secret-provider-class.yaml | kubectl apply -f -
#   done
#
# Vault OCIDs and the per-secret OCIDs come from terraform outputs of
# ensure_vault.sh (or directly from the OCI Console if provisioned by hand).

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: octo-vault
  namespace: ${NAMESPACE}
spec:
  provider: oci
  parameters:
    vaultId: "${OCI_VAULT_OCID}"
    region: "${OCI_REGION}"
    authType: instance_principal
    secrets: |
      - secretName: "token-secret"
        ocid: "${VAULT_SECRET_OCID_AUTH_TOKEN}"
      - secretName: "internal-service-key"
        ocid: "${VAULT_SECRET_OCID_INTERNAL_SERVICE_KEY}"
      - secretName: "app-secret-key"
        ocid: "${VAULT_SECRET_OCID_APP_SECRET_KEY}"
      - secretName: "bootstrap-admin-password"
        ocid: "${VAULT_SECRET_OCID_BOOTSTRAP_ADMIN}"
      - secretName: "oracle-dsn"
        ocid: "${VAULT_SECRET_OCID_ORACLE_DSN}"
      - secretName: "oracle-username"
        ocid: "${VAULT_SECRET_OCID_ORACLE_USERNAME}"
      - secretName: "oracle-password"
        ocid: "${VAULT_SECRET_OCID_ORACLE_PASSWORD}"
      - secretName: "oracle-wallet-password"
        ocid: "${VAULT_SECRET_OCID_ORACLE_WALLET_PASSWORD}"
      - secretName: "idcs-client-secret"
        ocid: "${VAULT_SECRET_OCID_IDCS_CLIENT_SECRET}"
      - secretName: "apm-private-datakey"
        ocid: "${VAULT_SECRET_OCID_APM_PRIVATE_DATAKEY}"
      - secretName: "apm-public-datakey"
        ocid: "${VAULT_SECRET_OCID_APM_PUBLIC_DATAKEY}"
  # Sync the mounted files back into Kubernetes Secrets so the existing
  # Deployment env references (secretKeyRef) continue to work unchanged.
  secretObjects:
    - secretName: octo-auth
      type: Opaque
      data:
        - objectName: token-secret
          key: token-secret
        - objectName: internal-service-key
          key: internal-service-key
        - objectName: app-secret-key
          key: app-secret-key
        - objectName: bootstrap-admin-password
          key: bootstrap-admin-password
    - secretName: octo-atp
      type: Opaque
      data:
        # Deployments also read `dsn` and `username` from this secret —
        # Vault must hold both or those env vars will be empty at pod
        # start and the app will fail to reach ATP.
        - objectName: oracle-dsn
          key: dsn
        - objectName: oracle-username
          key: username
        - objectName: oracle-password
          key: password
        - objectName: oracle-wallet-password
          key: wallet-password
    - secretName: octo-sso
      type: Opaque
      data:
        - objectName: idcs-client-secret
          key: idcs-client-secret
    - secretName: octo-apm
      type: Opaque
      data:
        - objectName: apm-private-datakey
          key: private-key
        - objectName: apm-public-datakey
          key: public-key

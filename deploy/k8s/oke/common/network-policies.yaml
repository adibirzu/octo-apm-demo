# NetworkPolicy — lets shop ↔ crm traffic across namespaces while
# denying any other inbound traffic on the pod port.
#
# Assumes the OKE cluster's CNI supports NetworkPolicy (VCN-native CNI
# with Calico overlay or OCI CNI with policy=enabled).

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-backend
  namespace: ${K8S_NAMESPACE_SHOP}
spec:
  podSelector:
    matchLabels:
      app: octo-drone-shop
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress from the existing OCI Load Balancer / worker NodePort path.
    - from:
        - ipBlock:
            cidr: ${OKE_EXTERNAL_INGRESS_CIDR}
      ports:
        - protocol: TCP
          port: 8080
    # Allow ingress from the CRM namespace (service-to-service callbacks)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ${K8S_NAMESPACE_CRM}
      ports:
        - protocol: TCP
          port: 8080

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-shop
  namespace: ${K8S_NAMESPACE_CRM}
spec:
  podSelector:
    matchLabels:
      app: enterprise-crm-portal
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: ${OKE_EXTERNAL_INGRESS_CIDR}
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ${K8S_NAMESPACE_SHOP}
      ports:
        - protocol: TCP
          port: 8080

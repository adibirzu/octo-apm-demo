<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#2d3436" rx="12"/>
  <!-- 6 arms for heavy-lift -->
  <line x1="100" y1="90" x2="180" y2="135" stroke="#fdcb6e" stroke-width="5"/>
  <line x1="300" y1="90" x2="220" y2="135" stroke="#fdcb6e" stroke-width="5"/>
  <line x1="80" y1="150" x2="170" y2="150" stroke="#fdcb6e" stroke-width="5"/>
  <line x1="320" y1="150" x2="230" y2="150" stroke="#fdcb6e" stroke-width="5"/>
  <line x1="100" y1="210" x2="180" y2="165" stroke="#fdcb6e" stroke-width="5"/>
  <line x1="300" y1="210" x2="220" y2="165" stroke="#fdcb6e" stroke-width="5"/>
  <!-- Propellers -->
  <circle cx="100" cy="90" r="25" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="90" r="25" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.4"/>
  <circle cx="80" cy="150" r="25" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.4"/>
  <circle cx="320" cy="150" r="25" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.4"/>
  <circle cx="100" cy="210" r="25" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.4"/>
  <circle cx="300" cy="210" r="25" fill="none" stroke="#fdcb6e" stroke-width="2" opacity="0.4"/>
  <!-- Body -->
  <rect x="160" y="120" width="80" height="60" rx="8" fill="#3d4447" stroke="#fdcb6e" stroke-width="2.5"/>
  <!-- Sensor payload -->
  <rect x="180" y="182" width="40" height="20" rx="4" fill="#444" stroke="#fdcb6e" stroke-width="1.5"/>
  <!-- Warning stripes -->
  <line x1="165" y1="125" x2="175" y2="125" stroke="#fdcb6e" stroke-width="3"/>
  <line x1="225" y1="125" x2="235" y2="125" stroke="#fdcb6e" stroke-width="3"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#eee" font-family="sans-serif" font-size="16" font-weight="bold">AgriSprayer Pro</text>
  <text x="200" y="275" text-anchor="middle" fill="#fdcb6e" font-family="sans-serif" font-size="11">INDUSTRIAL DRONE</text>
</svg>
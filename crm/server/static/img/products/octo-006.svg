<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0f3460" rx="12"/>
  <!-- Arms -->
  <line x1="110" y1="95" x2="185" y2="140" stroke="#ccc" stroke-width="5"/>
  <line x1="290" y1="95" x2="215" y2="140" stroke="#ccc" stroke-width="5"/>
  <line x1="110" y1="195" x2="185" y2="160" stroke="#ccc" stroke-width="5"/>
  <line x1="290" y1="195" x2="215" y2="160" stroke="#ccc" stroke-width="5"/>
  <!-- Propellers -->
  <ellipse cx="110" cy="95" rx="32" ry="10" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.5" transform="rotate(-20,110,95)"/>
  <ellipse cx="290" cy="95" rx="32" ry="10" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.5" transform="rotate(20,290,95)"/>
  <ellipse cx="110" cy="195" rx="32" ry="10" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.5" transform="rotate(20,110,195)"/>
  <ellipse cx="290" cy="195" rx="32" ry="10" fill="none" stroke="#00b4d8" stroke-width="2" opacity="0.5" transform="rotate(-20,290,195)"/>
  <!-- Body -->
  <rect x="160" y="125" width="80" height="50" rx="12" fill="#1a3a5c" stroke="#00b4d8" stroke-width="2"/>
  <!-- Camera gimbal -->
  <rect x="185" y="175" width="30" height="15" rx="4" fill="#555" stroke="#00b4d8" stroke-width="1"/>
  <circle cx="200" cy="195" r="8" fill="#222" stroke="#00b4d8" stroke-width="1.5"/>
  <circle cx="200" cy="195" r="3" fill="#00b4d8"/>
  <!-- Landing gear -->
  <line x1="165" y1="175" x2="155" y2="210" stroke="#aaa" stroke-width="2"/>
  <line x1="235" y1="175" x2="245" y2="210" stroke="#aaa" stroke-width="2"/>
  <line x1="145" y1="210" x2="165" y2="210" stroke="#aaa" stroke-width="3"/>
  <line x1="235" y1="210" x2="255" y2="210" stroke="#aaa" stroke-width="3"/>
  <!-- Label -->
  <text x="200" y="255" text-anchor="middle" fill="#eee" font-family="sans-serif" font-size="16" font-weight="bold">CinemaFly Xtreme</text>
  <text x="200" y="275" text-anchor="middle" fill="#00b4d8" font-family="sans-serif" font-size="11">CAMERA DRONE</text>
</svg>
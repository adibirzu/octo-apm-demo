<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1a1a2e" rx="12"/>
  <!-- Arms -->
  <line x1="120" y1="100" x2="200" y2="150" stroke="#e94560" stroke-width="4"/>
  <line x1="280" y1="100" x2="200" y2="150" stroke="#e94560" stroke-width="4"/>
  <line x1="120" y1="200" x2="200" y2="150" stroke="#e94560" stroke-width="4"/>
  <line x1="280" y1="200" x2="200" y2="150" stroke="#e94560" stroke-width="4"/>
  <!-- Propellers -->
  <circle cx="120" cy="100" r="28" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <circle cx="280" cy="100" r="28" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <circle cx="120" cy="200" r="28" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <circle cx="280" cy="200" r="28" fill="none" stroke="#e94560" stroke-width="2" opacity="0.6"/>
  <!-- Motors -->
  <circle cx="120" cy="100" r="8" fill="#16213e"/>
  <circle cx="280" cy="100" r="8" fill="#16213e"/>
  <circle cx="120" cy="200" r="8" fill="#16213e"/>
  <circle cx="280" cy="200" r="8" fill="#16213e"/>
  <!-- Body -->
  <ellipse cx="200" cy="150" rx="45" ry="22" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <!-- LED -->
  <circle cx="175" cy="142" r="4" fill="#e94560"/>
  <circle cx="225" cy="142" r="4" fill="#e94560"/>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" fill="#eee" font-family="sans-serif" font-size="16" font-weight="bold">Vortex Pro FPV</text>
  <text x="200" y="280" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="11">RACING DRONE</text>
</svg>
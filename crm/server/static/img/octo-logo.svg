<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" width="400" height="480">
  <defs>
    <style>
      .octo-fill { fill: #6ec6d0; }
      .octo-stroke { fill: none; stroke: #6ec6d0; stroke-width: 3; }
      .octo-text { fill: #6ec6d0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: 6px; }
      .product-text { fill: #8ad4dc; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-weight: 400; letter-spacing: 2px; font-size: 14px; }
    </style>
  </defs>

  <!-- Hexagonal shield outline -->
  <path d="M200 28 L268 60 L268 128 L200 160 L132 128 L132 60 Z"
        class="octo-stroke" stroke-width="4" stroke-linejoin="round"/>

  <!-- Brain with circuit pattern inside shield -->
  <g transform="translate(200,94)" class="octo-fill">
    <!-- Brain left hemisphere -->
    <path d="M-22,-24 C-22,-34 -14,-40 -6,-40 C0,-40 4,-36 4,-30
             C4,-36 8,-38 12,-38 C18,-38 22,-34 22,-28
             C22,-22 18,-16 14,-14 C18,-12 22,-8 22,-2
             C22,6 16,10 10,10 C6,10 2,8 0,4
             C-2,8 -6,10 -10,10 C-16,10 -22,6 -22,-2
             C-22,-8 -18,-14 -14,-16 C-18,-18 -22,-22 -22,-24 Z"
          opacity="0.9"/>
    <!-- Circuit traces -->
    <line x1="0" y1="-30" x2="0" y2="10" stroke="#1a2a3a" stroke-width="1.5" opacity="0.6"/>
    <line x1="-14" y1="-16" x2="14" y2="-16" stroke="#1a2a3a" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-24" r="2.5" fill="#1a2a3a" opacity="0.7"/>
    <circle cx="0" cy="-8" r="2.5" fill="#1a2a3a" opacity="0.7"/>
    <circle cx="-10" cy="-16" r="2" fill="#1a2a3a" opacity="0.7"/>
    <circle cx="10" cy="-16" r="2" fill="#1a2a3a" opacity="0.7"/>
    <circle cx="0" cy="4" r="2" fill="#1a2a3a" opacity="0.7"/>
    <!-- Circuit branches -->
    <line x1="0" y1="-24" x2="-10" y2="-30" stroke="#1a2a3a" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-24" x2="10" y2="-30" stroke="#1a2a3a" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-8" x2="-8" y2="-4" stroke="#1a2a3a" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-8" x2="8" y2="-4" stroke="#1a2a3a" stroke-width="1" opacity="0.5"/>
    <circle cx="-10" cy="-30" r="1.5" fill="#1a2a3a" opacity="0.6"/>
    <circle cx="10" cy="-30" r="1.5" fill="#1a2a3a" opacity="0.6"/>
  </g>

  <!-- Octopus head (dome) -->
  <ellipse cx="200" cy="210" rx="62" ry="52" class="octo-fill"/>

  <!-- Eyes -->
  <path d="M175,200 L185,194 L193,200 L185,202 Z" fill="#1a2a3a"/>
  <path d="M207,200 L215,194 L225,200 L215,202 Z" fill="#1a2a3a"/>

  <!-- Tentacle 1 — far left -->
  <path d="M155,245 Q110,270 80,310 Q55,345 45,370 Q35,395 55,400 Q65,395 60,380 Q55,365 65,345 Q75,325 95,305"
        class="octo-fill" opacity="0.95"/>
  <!-- Suction cups -->
  <ellipse cx="58" cy="388" rx="5" ry="3" fill="#1a2a3a" opacity="0.3"/>
  <ellipse cx="52" cy="374" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>
  <ellipse cx="56" cy="360" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>

  <!-- Tentacle 2 — left -->
  <path d="M162,252 Q130,285 115,320 Q100,355 100,380 Q100,405 120,400 Q130,395 125,375 Q120,355 125,335"
        class="octo-fill" opacity="0.95"/>
  <ellipse cx="112" cy="392" rx="5" ry="3" fill="#1a2a3a" opacity="0.3"/>
  <ellipse cx="105" cy="378" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>

  <!-- Tentacle 3 — center-left -->
  <path d="M172,258 Q155,295 150,330 Q145,365 150,390 Q155,410 170,405 Q178,398 172,378 Q168,358 170,338"
        class="octo-fill" opacity="0.95"/>
  <ellipse cx="162" cy="400" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>
  <ellipse cx="155" cy="385" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>

  <!-- Tentacle 4 — inner-left -->
  <path d="M185,262 Q180,300 182,335 Q184,365 188,385 Q192,400 200,395 Q205,388 198,370 Q194,352 194,335"
        class="octo-fill" opacity="0.95"/>

  <!-- Tentacle 5 — inner-right -->
  <path d="M215,262 Q220,300 218,335 Q216,365 212,385 Q208,400 200,395 Q195,388 202,370 Q206,352 206,335"
        class="octo-fill" opacity="0.95"/>

  <!-- Tentacle 6 — center-right -->
  <path d="M228,258 Q245,295 250,330 Q255,365 250,390 Q245,410 230,405 Q222,398 228,378 Q232,358 230,338"
        class="octo-fill" opacity="0.95"/>
  <ellipse cx="238" cy="400" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>
  <ellipse cx="245" cy="385" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>

  <!-- Tentacle 7 — right -->
  <path d="M238,252 Q270,285 285,320 Q300,355 300,380 Q300,405 280,400 Q270,395 275,375 Q280,355 275,335"
        class="octo-fill" opacity="0.95"/>
  <ellipse cx="288" cy="392" rx="5" ry="3" fill="#1a2a3a" opacity="0.3"/>
  <ellipse cx="295" cy="378" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>

  <!-- Tentacle 8 — far right -->
  <path d="M245,245 Q290,270 320,310 Q345,345 355,370 Q365,395 345,400 Q335,395 340,380 Q345,365 335,345 Q325,325 305,305"
        class="octo-fill" opacity="0.95"/>
  <ellipse cx="342" cy="388" rx="5" ry="3" fill="#1a2a3a" opacity="0.3"/>
  <ellipse cx="348" cy="374" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>
  <ellipse cx="344" cy="360" rx="4" ry="2.5" fill="#1a2a3a" opacity="0.25"/>

  <!-- OCTO text -->
  <text x="200" y="440" text-anchor="middle" class="octo-text" font-size="42">OCTO</text>

  <!-- Product name -->
  <text x="200" y="465" text-anchor="middle" class="product-text">OCTO-CRM-APM</text>
</svg>

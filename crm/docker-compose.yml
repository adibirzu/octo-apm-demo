services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-crm-portal
    ports:
      - "${APP_PORT:-8081}:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://${CRM_DB_USER:-crm_user}:${CRM_DB_PASSWORD:-change-me-local}@postgres:5432/${CRM_DB_NAME:-crm_db}}
      - DATABASE_SYNC_URL=${DATABASE_SYNC_URL:-postgresql://${CRM_DB_USER:-crm_user}:${CRM_DB_PASSWORD:-change-me-local}@postgres:5432/${CRM_DB_NAME:-crm_db}}
      - APP_ENV=${APP_ENV:-development}
      - APP_RUNTIME=${APP_RUNTIME:-docker}
    env_file:
      - .env
      - deploy/credentials.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r=httpx.get('http://localhost:8080/health'); r.raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - crm-net

  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    environment:
      POSTGRES_DB: ${CRM_DB_NAME:-crm_db}
      POSTGRES_USER: ${CRM_DB_USER:-crm_user}
      POSTGRES_PASSWORD: ${CRM_DB_PASSWORD:-change-me-local}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRM_DB_USER:-crm_user} -d ${CRM_DB_NAME:-crm_db}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - crm-net

volumes:
  pgdata:

networks:
  crm-net:
    driver: bridge

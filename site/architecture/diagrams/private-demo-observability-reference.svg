<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">Private Compute Observability Reference</title>
  <desc id="desc">Sanitized architecture diagram for the OCTO APM demo showing external entry points, OCI edge services, private application services, private data services, code delivery, and OCI Observability services. Public IP addresses and operator allowlists are intentionally omitted.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#c2410c"/>
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#7c3aed"/>
    </marker>
    <filter id="softShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .titlebar { fill: #111827; }
      .title { font: 700 28px Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #dbeafe; }
      .panel { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 18; filter: url(#softShadow); }
      .subpanel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 7 5; rx: 14; }
      .section { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .node-title { font: 700 15px Arial, sans-serif; fill: #0f172a; }
      .node { font: 400 13px Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px Arial, sans-serif; fill: #475569; }
      .note { font: 700 12px Arial, sans-serif; fill: #0f766e; }
      .edge { font: 700 12px Arial, sans-serif; fill: #334155; paint-order: stroke; stroke: #ffffff; stroke-width: 5px; stroke-linejoin: round; }
      .node-box { stroke-width: 2; rx: 12; filter: url(#softShadow); }
      .blue { fill: #dbeafe; stroke: #2563eb; }
      .green { fill: #d1fae5; stroke: #059669; }
      .yellow { fill: #fef3c7; stroke: #d97706; }
      .orange { fill: #ffedd5; stroke: #ea580c; }
      .rose { fill: #ffe4e6; stroke: #e11d48; }
      .indigo { fill: #e0e7ff; stroke: #4f46e5; }
      .purple { fill: #f5f3ff; stroke: #7c3aed; }
      .slate { fill: #f1f5f9; stroke: #475569; }
      .line-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow-blue); }
      .line-green { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .line-orange { stroke: #c2410c; stroke-width: 3; fill: none; marker-end: url(#arrow-orange); }
      .line-slate { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow-slate); }
      .line-purple { stroke: #7c3aed; stroke-width: 3; fill: none; marker-end: url(#arrow-purple); }
      .dash-blue { stroke: #2563eb; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-blue); }
      .dash-green { stroke: #059669; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-green); }
      .dash-slate { stroke: #475569; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow-slate); }
      .bus { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 14; stroke-dasharray: 8 6; }
    </style>
  </defs>


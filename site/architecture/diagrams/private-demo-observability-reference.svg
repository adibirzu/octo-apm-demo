<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Private Demo OCTO APM Demo private Compute observability architecture</title>
  <desc id="desc">Architecture showing browser RUM, OCI load balancer, WAF, public and private API Gateways, shop, admin, Java app-server sidecar, OCI Generative AI, optional Langfuse LLMetry export, Autonomous Database, OCI APM, OCI Logging, Service Connector Hub, Log Analytics, Cloud Guard OSQuery, Stack Monitoring, and code delivery paths.</desc>

version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mushop:mushop@postgres:5432/mushop
      - DATABASE_SYNC_URL=postgresql://mushop:mushop@postgres:5432/mushop
      - APP_NAME=mushop-cloudnative
      - APP_RUNTIME=docker
      - ENVIRONMENT=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mushop
      POSTGRES_USER: mushop
      POSTGRES_PASSWORD: mushop
    volumes:
      - ./server/db_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mushop -d mushop"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

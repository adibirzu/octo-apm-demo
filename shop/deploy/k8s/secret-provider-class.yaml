# OCI Secrets Store CSI Driver — SecretProviderClass for OCTO Drone Shop.
#
# Template manifest. DO NOT apply verbatim: replace the OCIDs and the
# vault region before rendering. Wired end-to-end, this lets the pod
# mount secrets directly from OCI Vault instead of a long-lived
# Kubernetes Secret managed by hand.
#
# Prerequisites:
#   1. OCI Secrets Store CSI driver + OCI provider installed in the cluster
#      (see https://github.com/oracle/oci-secrets-store-csi-driver).
#   2. A dynamic group and matching policy that lets OKE worker nodes
#      call `secrets.secretbundle.read` on the referenced Vault secrets.
#   3. Vault secrets already created with `deploy/oci/ensure_vault.sh`.
#
# Apply:
#   envsubst < deploy/k8s/secret-provider-class.yaml | kubectl apply -f -
#
# Then add to the Deployment pod spec:
#   volumes:
#     - name: octo-secrets
#       csi:
#         driver: secrets-store.csi.k8s.io
#         readOnly: true
#         volumeAttributes:
#           secretProviderClass: octo-drone-shop-vault
#   volumeMounts:
#     - name: octo-secrets
#       mountPath: /mnt/octo-secrets
#       readOnly: true
#
# And point the app at the mounted files by setting, e.g.:
#   AUTH_TOKEN_SECRET_FILE=/mnt/octo-secrets/auth-token-secret
#   ORACLE_PASSWORD_FILE=/mnt/octo-secrets/oracle-password
# (server/config.py already supports *_FILE variants for every secret.)

apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: octo-drone-shop-vault
  namespace: octo-drone-shop
spec:
  provider: oci
  parameters:
    vaultId: "${OCI_VAULT_OCID}"
    # Region slug without the ocir.io suffix, e.g. eu-frankfurt-1
    region: "${OCI_REGION}"
    # Authentication mode for the CSI provider. `instance_principal` is the
    # standard option on OKE.
    authType: instance_principal
    # Each item below lands as a file under the mount path.
    secrets: |
      - secretName: "auth-token-secret"
        ocid: "${VAULT_SECRET_OCID_AUTH_TOKEN}"
      - secretName: "internal-service-key"
        ocid: "${VAULT_SECRET_OCID_INTERNAL_SERVICE_KEY}"
      - secretName: "oracle-password"
        ocid: "${VAULT_SECRET_OCID_ORACLE_PASSWORD}"
      - secretName: "oracle-wallet-password"
        ocid: "${VAULT_SECRET_OCID_ORACLE_WALLET_PASSWORD}"
      - secretName: "idcs-client-secret"
        ocid: "${VAULT_SECRET_OCID_IDCS_CLIENT_SECRET}"
      - secretName: "apm-private-datakey"
        ocid: "${VAULT_SECRET_OCID_APM_PRIVATE_DATAKEY}"
